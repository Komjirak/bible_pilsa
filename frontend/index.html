<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <title>말씀필사</title>
    <meta name="description" content="하루 한 절, 성경 말씀을 직접 타이핑하는 필사 앱" />
    <style>
      /* 안드로이드 WebView 폰트 스케일링 기본 방어 (번들 로딩 전 적용) */
      html, body, * { -webkit-text-size-adjust: none !important; text-size-adjust: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 안드로이드 OS 폰트 스케일링 역보정 (번들 로딩 전 즉시 실행)
      (function() {
        try {
          var probe = document.createElement('div');
          probe.style.cssText = 'position:absolute;top:-9999px;left:-9999px;font-size:16px;line-height:1;height:auto;width:auto;visibility:hidden;pointer-events:none';
          probe.textContent = 'M';
          document.body.appendChild(probe);
          var h = probe.getBoundingClientRect().height;
          document.body.removeChild(probe);
          var scale = h / 16;
          if (scale > 1.02 || scale < 0.98) {
            var correction = 1 / scale;
            var html = document.documentElement;
            var root = document.getElementById('root');
            // 1) CSS zoom으로 전체 페이지 균등 역보정
            html.style.zoom = String(correction);
            // 2) zoom으로 축소된 만큼 html 치수를 반비례로 확장 (화면 꽉 채우기)
            html.style.width = (scale * 100) + 'vw';
            html.style.minHeight = (scale * 100) + 'vh';
            html.style.overflowX = 'hidden';
            // 3) body flex 중앙 정렬 해제 (좌측 기준 배치)
            document.body.style.justifyContent = 'flex-start';
            // 4) #root max-width 제거, min-height 확장 (화면 전체 높이 채우기)
            if (root) {
              root.style.maxWidth = 'none';
              root.style.minHeight = (scale * 100) + 'vh';
            }
            // 5) zoom-보정된 스크린 높이를 CSS 변수로 노출
            //    페이지 컴포넌트에서 height:var(--screen-height) 사용 시 실제 화면 꽉 참
            html.style.setProperty('--screen-height', (scale * 100) + 'vh');
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
