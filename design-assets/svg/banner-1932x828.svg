<svg width="1932" height="828" viewBox="0 0 1932 828" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1932" y2="828" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1521"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3182F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3182F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1932" height="828" fill="url(#bgGrad)"/>

  <!-- Subtle blue glow on the left -->
  <ellipse cx="400" cy="414" rx="500" ry="400" fill="#3182F6" fill-opacity="0.08"/>

  <!-- Logo mark (left) -->
  <g transform="translate(140, 264)">
    <rect width="300" height="300" rx="60" fill="#3182F6"/>
    <!-- Book icon simplified -->
    <path d="M70 90 Q70 80 80 80 L143 80 L143 210 Q143 220 133 220 L80 220 Q70 220 70 210 Z" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    <path d="M230 90 Q230 80 220 80 L157 80 L157 210 Q157 220 167 220 L220 220 Q230 220 230 210 Z" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    <line x1="143" y1="80" x2="157" y2="80" stroke="white" stroke-width="8"/>
    <line x1="143" y1="220" x2="157" y2="220" stroke="white" stroke-width="8"/>
    <!-- Small pen indicator -->
    <g transform="translate(162,120) rotate(-30)">
      <rect x="0" y="0" width="10" height="55" rx="3" fill="white"/>
      <polygon points="5,55 0,68 10,68" fill="#FFD233"/>
    </g>
    <!-- Active line -->
    <line x1="162" y1="148" x2="218" y2="148" stroke="#FFD233" stroke-width="5" stroke-linecap="round"/>
    <line x1="162" y1="130" x2="218" y2="130" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
    <line x1="162" y1="167" x2="200" y2="167" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left page lines -->
    <line x1="82" y1="120" x2="131" y2="120" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
    <line x1="82" y1="140" x2="131" y2="140" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
    <line x1="82" y1="160" x2="110" y2="160" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- App name and tagline (center-left) -->
  <text x="490" y="350" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="92" fill="white" letter-spacing="-2">말씀필사</text>
  <text x="494" y="415" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="400" font-size="38" fill="rgba(255,255,255,0.65)">말씀을 손으로 새기다</text>

  <!-- Divider line -->
  <line x1="490" y1="455" x2="880" y2="455" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Feature bullets -->
  <circle cx="506" cy="507" r="5" fill="#3182F6"/>
  <text x="525" y="515" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="30" fill="rgba(255,255,255,0.8)">매일 한 절 성경 구절 필사</text>

  <circle cx="506" cy="560" r="5" fill="#3182F6"/>
  <text x="525" y="568" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="30" fill="rgba(255,255,255,0.8)">오버레이 UX — 틀리면 빨간 글자</text>

  <circle cx="506" cy="613" r="5" fill="#3182F6"/>
  <text x="525" y="621" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="30" fill="rgba(255,255,255,0.8)">7일 완주 시 토스 포인트 10원</text>

  <!-- Right: phone mockup with app screen (decorative) -->
  <g transform="translate(1140, 64)">
    <!-- Phone body -->
    <rect x="0" y="0" width="380" height="700" rx="45" fill="#1E2A3A" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
    <!-- Screen -->
    <rect x="14" y="14" width="352" height="672" rx="34" fill="#191F28"/>
    <!-- Status bar -->
    <rect x="14" y="14" width="352" height="48" rx="34" fill="#191F28"/>
    <text x="190" y="46" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">9:41 AM</text>
    <!-- Notch -->
    <rect x="130" y="14" width="120" height="28" rx="14" fill="#1E2A3A"/>
    <!-- App header -->
    <text x="190" y="100" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="600" font-size="22" fill="white">말씀필사</text>
    <!-- Date badge -->
    <rect x="62" y="120" width="256" height="36" rx="18" fill="#3182F6" fill-opacity="0.15"/>
    <text x="190" y="144" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="17" fill="#3182F6">2026년 3월 6일 목요일</text>
    <!-- Verse card -->
    <rect x="28" y="172" width="324" height="220" rx="20" fill="#1E2A3A"/>
    <text x="190" y="212" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">요한복음 3:16</text>
    <text x="60" y="250" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="17" fill="rgba(255,255,255,0.9)">하나님이 세상을</text>
    <text x="60" y="278" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="17" fill="rgba(255,255,255,0.9)">이처럼 사랑하사</text>
    <text x="60" y="306" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="17" fill="rgba(255,255,255,0.9)">독생자를 주셨으니…</text>
    <!-- Weekly strip -->
    <rect x="28" y="410" width="324" height="88" rx="16" fill="#1E2A3A"/>
    <text x="48" y="437" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">이번 주 진행 (3/7)</text>
    <!-- Day dots -->
    <circle cx="75" cy="470" r="14" fill="#3182F6"/>
    <text x="75" y="475" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">월</text>
    <circle cx="120" cy="470" r="14" fill="#3182F6"/>
    <text x="120" y="475" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">화</text>
    <circle cx="165" cy="470" r="14" fill="#3182F6"/>
    <text x="165" y="475" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif">수</text>
    <circle cx="210" cy="470" r="14" stroke="#3182F6" stroke-width="2.5" fill="transparent"/>
    <text x="210" y="475" text-anchor="middle" font-size="11" fill="#3182F6" font-family="sans-serif">목</text>
    <circle cx="255" cy="470" r="14" fill="rgba(255,255,255,0.1)"/>
    <text x="255" y="475" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" font-family="sans-serif">금</text>
    <circle cx="300" cy="470" r="14" fill="rgba(255,255,255,0.1)"/>
    <text x="300" y="475" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" font-family="sans-serif">토</text>
    <circle cx="345" cy="470" r="14" fill="rgba(255,255,255,0.1)"/>
    <text x="345" y="475" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" font-family="sans-serif">일</text>
    <!-- CTA button -->
    <rect x="28" y="516" width="324" height="56" rx="16" fill="#3182F6"/>
    <text x="190" y="550" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="600" font-size="19" fill="white">오늘의 말씀 필사하기</text>
    <!-- Home indicator -->
    <rect x="148" y="650" width="84" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Toss badge -->
  <g transform="translate(1640, 740)">
    <rect x="0" y="0" width="200" height="52" rx="26" fill="rgba(255,255,255,0.08)"/>
    <text x="100" y="33" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">앱인토스에서</text>
  </g>
</svg>
