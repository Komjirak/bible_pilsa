  <text x="318" y="250" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="28" fill="white">7일 완주 축하드려요!</text>
  <text x="318" y="290" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="17" fill="rgba(255,255,255,0.6)">이번 주 매일 말씀을 새기셨네요</text>

  <!-- Points reward card -->
  <rect x="20" y="316" width="596" height="148" rx="20" fill="rgba(49,130,246,0.12)" stroke="#3182F6" stroke-width="1.5"/>
  <text x="318" y="358" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" fill="rgba(255,255,255,0.5)">토스 포인트 적립</text>
  <text x="318" y="418" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="52" fill="#3182F6">+ 10원</text>
  <text x="318" y="450" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">내 포인트로 자동 적립됩니다</text>

  <!-- Completed verse recap -->
  <rect x="20" y="484" width="596" height="168" rx="16" fill="#1E2A3A"/>
  <text x="44" y="514" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">오늘 필사한 말씀 · 요한복음 3:16</text>
  <text x="44" y="552" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.85)" font-style="italic">하나님이 세상을 이처럼 사랑하사</text>
  <text x="44" y="582" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.85)" font-style="italic">독생자를 주셨으니 이는 저를 믿는</text>
  <text x="44" y="612" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.85)" font-style="italic">자마다 멸망하지 않고 영생을 얻게…</text>
