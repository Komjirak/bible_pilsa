  <g font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="12">
    <circle cx="68" cy="734" r="18" fill="#3182F6"/>
    <text x="68" y="739" text-anchor="middle" fill="white">월</text>
    <circle cx="152" cy="734" r="18" fill="#3182F6"/>
    <text x="152" y="739" text-anchor="middle" fill="white">화</text>
    <circle cx="236" cy="734" r="18" fill="#3182F6"/>
    <text x="236" y="739" text-anchor="middle" fill="white">수</text>
    <circle cx="320" cy="734" r="18" fill="#3182F6"/>
    <text x="320" y="739" text-anchor="middle" fill="white">목</text>
    <circle cx="404" cy="734" r="18" fill="#3182F6"/>
    <text x="404" y="739" text-anchor="middle" fill="white">금</text>
    <circle cx="488" cy="734" r="18" fill="#3182F6"/>
    <text x="488" y="739" text-anchor="middle" fill="white">토</text>
    <circle cx="572" cy="734" r="18" fill="#3182F6"/>
    <text x="572" y="739" text-anchor="middle" fill="white">일</text>
  </g>

  <!-- Share button -->
  <rect x="20" y="784" width="596" height="64" rx="18" fill="#3182F6"/>
  <text x="318" y="824" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="20" fill="white">완료 카드 공유하기</text>

  <!-- Home button -->
  <rect x="20" y="864" width="596" height="56" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="318" y="898" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">홈으로 돌아가기</text>

  <!-- Copyright footer -->
  <text x="318" y="952" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">성경 번역 출처: 대한성서공회 개역한글판 (1961년판)</text>

  <!-- Home indicator -->
  <rect x="218" y="1010" width="200" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
