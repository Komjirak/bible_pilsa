<svg width="636" height="1048" viewBox="0 0 636 1048" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App Screen: Completion (7일 완주 포인트 적립) -->
  <rect width="636" height="1048" fill="#191F28"/>

  <!-- Status bar -->
  <rect width="636" height="48" fill="#191F28"/>
  <text x="48" y="32" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)" font-weight="600">9:41</text>
  <rect x="540" y="18" width="40" height="16" rx="4" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
  <rect x="542" y="20" width="30" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>

  <!-- Nav bar -->
  <text x="318" y="88" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="20" fill="white">필사 완료</text>
  <line x1="0" y1="100" x2="636" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Celebration header -->
