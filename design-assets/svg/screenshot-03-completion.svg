  <rect x="476" y="618" width="120" height="28" rx="10" fill="rgba(49,130,246,0.2)"/>
  <text x="536" y="637" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#3182F6">정확도 96%</text>

