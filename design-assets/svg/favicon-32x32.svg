<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: Toss Blue full square (앱스토어 제출용 — 크롭 없이 꽉 찬 사각형) -->
  <rect width="32" height="32" fill="#3182F6"/>

  <!-- 성경책 — 32px에서 가독성을 위해 rect 아웃라인 방식, 굵은 선 -->
  <!-- 왼쪽 페이지 -->
  <rect x="4" y="7" width="10" height="18" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- 오른쪽 페이지 -->
  <rect x="18" y="7" width="10" height="18" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- 책등 상단·하단 연결 -->
  <line x1="14" y1="7"  x2="18" y2="7"  stroke="white" stroke-width="2.5"/>
  <line x1="14" y1="25" x2="18" y2="25" stroke="white" stroke-width="2.5"/>
  <!-- 현재 필사 중인 라인 (노란색) -->
  <line x1="20" y1="16" x2="26" y2="16" stroke="#FFD233" stroke-width="2" stroke-linecap="round"/>
</svg>
