<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1521"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Blue glow -->
  <ellipse cx="300" cy="315" rx="380" ry="300" fill="#3182F6" fill-opacity="0.07"/>

  <!-- Logo mark -->
  <g transform="translate(100, 200)">
    <rect width="220" height="220" rx="44" fill="#3182F6"/>
    <path d="M51 66 Q51 58 59 58 L105 58 L105 154 Q105 162 97 162 L59 162 Q51 162 51 154 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <path d="M169 66 Q169 58 161 58 L115 58 L115 154 Q115 162 123 162 L161 162 Q169 162 169 154 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <line x1="105" y1="58" x2="115" y2="58" stroke="white" stroke-width="6"/>
    <line x1="105" y1="154" x2="115" y2="154" stroke="white" stroke-width="6"/>
    <g transform="translate(118,88) rotate(-30)">
      <rect x="0" y="0" width="8" height="42" rx="2" fill="white"/>
      <polygon points="4,42 0,52 8,52" fill="#FFD233"/>
    </g>
    <line x1="118" y1="113" x2="160" y2="113" stroke="#FFD233" stroke-width="4" stroke-linecap="round"/>
    <line x1="118" y1="97" x2="160" y2="97" stroke="rgba(255,255,255,0.7)" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="90" x2="97" y2="90" stroke="rgba(255,255,255,0.7)" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="107" x2="97" y2="107" stroke="rgba(255,255,255,0.7)" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="124" x2="80" y2="124" stroke="rgba(255,255,255,0.7)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Text block -->
  <text x="365" y="265" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-1">말씀필사</text>
  <text x="365" y="330" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="300" font-size="30" fill="rgba(255,255,255,0.6)">말씀을 손으로 새기다</text>
  <line x1="365" y1="360" x2="780" y2="360" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Quote verse -->
  <text x="365" y="405" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="24" fill="rgba(255,255,255,0.75)" font-style="italic">토스에서 바로 시작하는 성경 구절 필사</text>
  <text x="365" y="445" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">하루 한 절, 직접 타이핑하며 말씀을 새겨보세요</text>

  <!-- Toss badge (right) -->
  <rect x="870" y="220" width="230" height="200" rx="40" fill="rgba(49,130,246,0.12)" stroke="rgba(49,130,246,0.3)" stroke-width="1.5"/>
  <text x="985" y="295" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">앱인토스 미니앱</text>
  <text x="985" y="335" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="28" fill="#3182F6">7일 완주</text>
  <text x="985" y="375" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">토스포인트 10원</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(49,130,246,0.08)"/>
  <text x="600" y="612" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.4)">성경 번역 출처: 대한성서공회 개역한글판 (1961년판, 퍼블릭 도메인)</text>
</svg>
