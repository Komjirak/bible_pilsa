<svg width="636" height="1048" viewBox="0 0 636 1048" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App Screen: Home -->
  <rect width="636" height="1048" fill="#191F28"/>

  <!-- Status bar -->
  <rect width="636" height="48" fill="#191F28"/>
  <text x="48" y="32" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)" font-weight="600">9:41</text>
  <!-- Battery/signal icons placeholder -->
  <rect x="540" y="18" width="40" height="16" rx="4" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
  <rect x="542" y="20" width="30" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="581" y="22" width="4" height="8" rx="1" fill="rgba(255,255,255,0.7)"/>

  <!-- Nav bar -->
  <text x="318" y="88" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="22" fill="white">말씀필사</text>
  <line x1="0" y1="100" x2="636" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Weekly calendar strip -->
  <rect x="20" y="116" width="596" height="92" rx="16" fill="#1E2A3A"/>
  <text x="38" y="142" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">이번 주 진행 현황</text>
  <!-- Day circles -->
  <g font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="12">
    <!-- 월 (completed) -->
    <circle cx="68" cy="178" r="20" fill="#3182F6"/>
    <text x="68" y="183" text-anchor="middle" fill="white">월</text>
    <!-- 화 (completed) -->
    <circle cx="152" cy="178" r="20" fill="#3182F6"/>
    <text x="152" y="183" text-anchor="middle" fill="white">화</text>
    <!-- 수 (completed) -->
    <circle cx="236" cy="178" r="20" fill="#3182F6"/>
    <text x="236" y="183" text-anchor="middle" fill="white">수</text>
    <!-- 목 (today, not completed) -->
    <circle cx="320" cy="178" r="20" stroke="#3182F6" stroke-width="2.5" fill="transparent"/>
    <text x="320" y="183" text-anchor="middle" fill="#3182F6">목</text>
    <!-- 금 (future) -->
    <circle cx="404" cy="178" r="20" fill="rgba(255,255,255,0.08)"/>
    <text x="404" y="183" text-anchor="middle" fill="rgba(255,255,255,0.35)">금</text>
    <!-- 토 (future) -->
    <circle cx="488" cy="178" r="20" fill="rgba(255,255,255,0.08)"/>
    <text x="488" y="183" text-anchor="middle" fill="rgba(255,255,255,0.35)">토</text>
    <!-- 일 (future) -->
    <circle cx="572" cy="178" r="20" fill="rgba(255,255,255,0.08)"/>
    <text x="572" y="183" text-anchor="middle" fill="rgba(255,255,255,0.35)">일</text>
  </g>

  <!-- Date header -->
  <text x="38" y="236" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">2026년 3월 6일 목요일</text>
  <text x="38" y="270" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="600" font-size="24" fill="white">오늘의 말씀</text>

  <!-- Verse card -->
  <rect x="20" y="290" width="596" height="296" rx="20" fill="#1E2A3A"/>
  <!-- Book/chapter badge -->
  <rect x="44" y="314" width="120" height="28" rx="14" fill="rgba(49,130,246,0.2)"/>
  <text x="104" y="333" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#3182F6">요한복음 3:16</text>
  <!-- Verse text (Noto Serif style) -->
  <text x="44" y="378" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" font-style="italic">하나님이 세상을 이처럼</text>
  <text x="44" y="412" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" font-style="italic">사랑하사 독생자를</text>
  <text x="44" y="446" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" font-style="italic">주셨으니 이는 저를 믿는</text>
  <text x="44" y="480" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" font-style="italic">자마다 멸망하지 않고</text>
  <text x="44" y="514" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" font-style="italic">영생을 얻게 하려 하심이라</text>
  <!-- Word count -->
  <text x="572" y="568" text-anchor="end" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">38자</text>

  <!-- CTA Button -->
  <rect x="20" y="608" width="596" height="64" rx="18" fill="#3182F6"/>
  <text x="318" y="648" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="20" fill="white">오늘의 말씀 필사하기</text>

  <!-- Points info card -->
  <rect x="20" y="692" width="596" height="92" rx="16" fill="#1E2A3A"/>
  <text x="44" y="722" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">7일 완주 챌린지</text>
  <text x="44" y="755" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="600" font-size="20" fill="white">이번 주 4일째 — 3일 더 하면</text>
  <rect x="380" y="738" width="108" height="36" rx="10" fill="rgba(49,130,246,0.2)"/>
  <text x="434" y="762" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="700" font-size="18" fill="#3182F6">+10원</text>

  <!-- Copyright footer -->
  <text x="318" y="820" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">성경 번역 출처: 대한성서공회 개역한글판 (1961년판)</text>

  <!-- Home indicator -->
  <rect x="218" y="1010" width="200" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Screen label overlay at bottom for store listing -->
  <rect x="0" y="950" width="636" height="0" fill="transparent"/>
</svg>
